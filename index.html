<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Nabilla! 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">
    
    <style>
        /* */
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #121212;
            color: #ffe4e1;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
        }

        #fireworksCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            pointer-events: none;
        }

        .bg-bubbles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .bg-bubbles li {
            position: absolute;
            list-style: none;
            display: block;
            width: 40px;
            height: 40px;
            background-color: rgba(255, 105, 180, 0.15);
            bottom: -160px;
            animation: square 25s infinite;
            transition-timing-function: linear;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 20, 147, 0.4);
            font-size: 30px;
            text-align: center;
            line-height: 40px;
        }
        .bg-bubbles li:nth-child(1) { left: 10%; animation-duration: 15s; }
        .bg-bubbles li:nth-child(2) { left: 20%; width: 80px; height: 80px; animation-duration: 22s; animation-delay: 2s; }
        .bg-bubbles li:nth-child(3) { left: 25%; animation-duration: 18s; animation-delay: 4s; }
        .bg-bubbles li:nth-child(4) { left: 40%; width: 60px; height: 60px; background-color: rgba(255, 20, 147, 0.25); animation-duration: 24s; }
        .bg-bubbles li:nth-child(5) { left: 70%; animation-duration: 20s; }
        .bg-bubbles li:nth-child(6) { left: 80%; width: 120px; height: 120px; background-color: rgba(255, 105, 180, 0.1); animation-duration: 30s; animation-delay: 3s; }
        .bg-bubbles li:nth-child(7) { left: 32%; width: 160px; height: 160px; animation-duration: 35s; animation-delay: 7s; }
        .bg-bubbles li:nth-child(8) { left: 55%; width: 20px; height: 20px; animation-duration: 12s; animation-delay: 15s; }
        .bg-bubbles li:nth-child(9) { left: 25%; width: 10px; height: 10px; background-color: rgba(255, 20, 147, 0.3); animation-duration: 16s; animation-delay: 2s; }
        .bg-bubbles li:nth-child(10) { left: 90%; width: 160px; height: 160px; animation-duration: 28s; animation-delay: 11s; }

        @keyframes square {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120vh) rotate(600deg); opacity: 0; }
        }

        .card {
            background: rgba(36, 21, 28, 0.85);
            backdrop-filter: blur(8px);
            border: 2px solid #ff1493;
            box-shadow: 0 0 30px rgba(255, 20, 147, 0.4), inset 0 0 15px rgba(255, 105, 180, 0.2);
            border-radius: 25px;
            width: 90%;
            max-width: 450px;
            padding: 30px;
            text-align: center;
            position: relative;
            z-index: 10;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .slide {
            display: none;
            animation: fadeIn 0.6s ease-in-out forwards;
        }
        .slide.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: #ff69b4;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5), 0 0 15px #ff1493;
            font-size: 32px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        p {
            font-size: 17px;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        
        .photo-frame {
            background: #fff;
            padding: 10px 10px 25px 10px;
            border-radius: 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            margin: 0 auto 20px auto;
            max-width: 250px;
            transform: rotate(-3deg);
            transition: 0.3s;
        }
        .photo-frame:hover {
            transform: rotate(2deg) scale(1.05);
        }
        .photo-frame img {
            width: 100%;
            border-radius: 3px;
            height: 230px;
            object-fit: cover;
        }
        .photo-caption {
            color: #333;
            font-size: 14px;
            font-family: 'Pacifico', cursive;
            margin-top: 10px;
            margin-bottom: 0;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .btn {
            background: linear-gradient(45deg, #ff1493, #ff69b4);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 20, 147, 0.6);
        }
        .btn:active {
            transform: translateY(1px);
        }
        .btn-back {
            background: transparent;
            border: 2px solid #ff69b4;
            color: #ff69b4;
            box-shadow: none;
        }
        .btn-back:hover {
            background: rgba(255, 105, 180, 0.1);
            color: #ff1493;
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.2);
        }
        
        .dodge-btn {
            position: relative;
            z-index: 20;
            transition: top 0.2s, left 0.2s;
        }

        /* Tombol Music Toggle di pojok kanan atas */
        #musicToggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(36, 21, 28, 0.7);
            border: 1px solid #ff69b4;
            color: #ff69b4;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 20px;
            cursor: pointer;
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(255, 20, 147, 0.4);
        }
        #musicToggle:hover {
            background: rgba(255, 105, 180, 0.3);
            transform: scale(1.1);
        }

        .game-area {
            width: 100%;
            height: 220px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px dashed #ff69b4;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: inset 0 0 10px rgba(255, 20, 147, 0.2);
        }
        .target-item {
            font-size: 45px;
            position: absolute;
            top: 50%;
            left: 50%;
            cursor: pointer;
            user-select: none;
            transition: left 0.15s ease-out, top 0.15s ease-out, transform 0.1s;
            z-index: 5;
            padding: 10px;
            margin: -10px;
            -webkit-tap-highlight-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255, 105, 180, 0.8));
        }
    </style>
</head>
<body>

    <!-- Audio Element untuk Lagu -->
    <audio id="bgMusic" src="sampai-jadi-debu.mp3" loop preload="auto"></audio>

    <!-- Tombol Audio -->
    <button id="musicToggle" onclick="toggleMusic()">🔊</button>

    <!-- Canvas Kembang Api -->
    <canvas id="fireworksCanvas"></canvas>

    <!-- Animasi Latar Belakang -->
    <ul class="bg-bubbles">
        <li>💖</li><li></li><li>✨</li><li></li><li>💕</li><li></li><li>🎉</li><li></li><li>🌸</li><li></li>
    </ul>

    <div class="card" id="mainCard">
        
        <!-- SLIDE 1: Pembukaan -->
        <div id="slide1" class="slide active">
            <h1>Hai, Nabilla! 👋</h1>
            <p>Hari ini hari spesial kamu kan? Aku ada sedikit kejutan kecil nih buat kamu. Boleh dilihat nggak?</p>
            <div class="btn-group">
                <button class="btn" onclick="goToSlide(2)">Boleh dong! 👀</button>
            </div>
        </div>

    <!-- -->
    <script>
        // --- LOGIKA MUSIK BANDA NEIRA ---
        let audioInitialized = false;
        let isMuted = false;
        const bgMusic = document.getElementById('bgMusic');

        async function initAudio() {
            if(audioInitialized) return;
            
            try {
                // Memutar musik bawaan (MP3)
                bgMusic.volume = 0.6; // Atur volume (0.0 sampai 1.0)
                await bgMusic.play();
                audioInitialized = true;
                
                // Munculkan tombol mute di pojok
                document.getElementById('musicToggle').style.display = 'flex';
            } catch (err) {
                console.log("Autoplay dicegah oleh browser. Pengguna harus menekan tombol musik.", err);
            }
        }

        // Fungsi untuk menghidupkan/mematikan suara
        function toggleMusic() {
            if(!audioInitialized) {
                initAudio();
                return;
            }
            isMuted = !isMuted;
            if(isMuted) {
                bgMusic.pause();
                document.getElementById('musicToggle').innerText = '🔇';
            } else {
                bgMusic.play();
                document.getElementById('musicToggle').innerText = '🔊';
            }
        }

        // --- NAVIGASI SLIDE ---
        function goToSlide(slideNumber) {
            // Mainkan musik saat pengguna menekan tombol pertama ("Boleh dong!")
            if (slideNumber === 2 && !audioInitialized) {
                initAudio();
            }

            const slides = document.querySelectorAll('.slide');
            slides.forEach(slide => {
                slide.classList.remove('active');
            });
            
            const nextSlide = document.getElementById('slide' + slideNumber);
            nextSlide.classList.add('active');

            // Reset posisi semua tombol kuis jika pindah slide
            const dodgeBtns = document.querySelectorAll('.dodge-btn');
            dodgeBtns.forEach(btn => {
                btn.style.position = 'relative';
                btn.style.left = '0';
                btn.style.top = '0';
            });

            // Trigger game di slide 9
            if (slideNumber === 9) {
                startGame();
            } else {
                stopGame();
            }
        }

        // --- LOGIKA KUIS (TOMBOL KABUR) ---
        function dodgeButton(btn) {
            const container = btn.parentElement;
            
            btn.style.position = 'absolute';
            
            const maxX = container.clientWidth - btn.clientWidth;
            const maxY = container.clientHeight - btn.clientHeight;
            
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);
            
            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
        }

        // --- LOGIKA MINI GAME (TANGKAP KADO) ---
        let score = 0;
        let gameInterval;

        function startGame() {
            score = 0;
            document.getElementById('score').innerText = score;
            document.getElementById('gameBtnNext').style.display = 'none';
            document.getElementById('winMessage').style.display = 'none';
            
            const target = document.getElementById('targetItem');
            target.style.display = 'block';
            target.innerHTML = '🎁'; 
            
            moveItem();
            clearInterval(gameInterval);
            gameInterval = setInterval(moveItem, 900);
        }

        function stopGame() {
            if(gameInterval) clearInterval(gameInterval);
        }

        function moveItem() {
            const target = document.getElementById('targetItem');
            const gameArea = document.getElementById('gameArea');
            
            const maxX = gameArea.clientWidth - 50; 
            const maxY = gameArea.clientHeight - 50;

            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            target.style.left = randomX + 'px';
            target.style.top = randomY + 'px';
        }

        function catchItem() {
            score++;
            document.getElementById('score').innerText = score;
            
            const target = document.getElementById('targetItem');
            
            target.style.transform = 'scale(1.4) rotate(10deg)';
            setTimeout(() => target.style.transform = 'scale(1) rotate(0deg)', 150);

            if (score >= 5) {
                stopGame();
                target.innerHTML = '✨💌✨'; 
                setTimeout(() => {
                    target.style.display = 'none';
                    document.getElementById('gameBtnNext').style.display = 'block';
                    document.getElementById('winMessage').style.display = 'block';
                }, 800);
            } else {
                moveItem(); 
                clearInterval(gameInterval); 
                gameInterval = setInterval(moveItem, 900 - (score * 120)); 
            }
        }

        // --- EFEK LEDAKAN HATI FINAL ---
        function ledakanHati() {
            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    const emojis = ['💖', '✨', '🌸', '💕'];
                    heart.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                    heart.style.position = 'fixed';
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.top = '-50px';
                    heart.style.fontSize = (Math.random() * 30 + 15) + 'px';
                    heart.style.zIndex = '99999';
                    heart.style.transition = 'transform 3s linear, top 3s linear, opacity 3s linear';
                    
                    document.body.appendChild(heart);

                    setTimeout(() => {
                        heart.style.top = '120vh';
                        heart.style.transform = `rotate(${Math.random() * 360}deg)`;
                        heart.style.opacity = '0';
                    }, 50);

                    setTimeout(() => {
                        heart.remove();
                    }, 3000);
                }, i * 40);
            }
        }

        // --- KEMBANG API (FIREWORKS) NON-STOP ---
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        let cw = window.innerWidth;
        let ch = window.innerHeight;
        canvas.width = cw;
        canvas.height = ch;

        window.addEventListener('resize', () => {
            cw = window.innerWidth;
            ch = window.innerHeight;
            canvas.width = cw;
            canvas.height = ch;
        });

        const fireworks = [];
        const particles = [];
        
        function random(min, max) { return Math.random() * (max - min) + min; }

        function createParticles(x, y) {
            let particleCount = 100;
            while(particleCount--) {
                particles.push({
                    x: x,
                    y: y,
                    vx: random(-6, 6),
                    vy: random(-6, 6),
                    alpha: 1,
                    hue: random(300, 350), 
                    brightness: random(60, 100),
                    decay: random(0.01, 0.02)
                });
            }
        }

        function updateFireworks() {
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, cw, ch);
            ctx.globalCompositeOperation = 'lighter';

            if (Math.random() < 0.08) {
                let startX = random(cw * 0.05, cw * 0.95);
                fireworks.push({
                    x: startX,
                    y: ch,
                    tx: startX + random(-80, 80),
                    ty: random(ch * 0.1, ch * 0.6),
                    speed: random(5, 8)
                });
            }

            for (let i = fireworks.length - 1; i >= 0; i--) {
                let f = fireworks[i];
                ctx.beginPath();
                ctx.arc(f.x, f.y, 2.5, 0, Math.PI * 2);
                ctx.fillStyle = '#ff69b4';
                ctx.fill();

                f.y -= f.speed;
                f.x += (f.tx - f.x) * 0.02;

                if (f.y <= f.ty) {
                    createParticles(f.x, f.y);
                    fireworks.splice(i, 1);
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                ctx.beginPath();
                ctx.arc(p.x, p.y, random(1, 3.5), 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${p.hue}, 100%, ${p.brightness}%, ${p.alpha})`;
                ctx.fill();

                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.05;
                p.alpha -= p.decay;

                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(updateFireworks);
        }
        
        updateFireworks();
    </script>
</body>
</html>
